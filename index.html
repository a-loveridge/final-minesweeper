<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Minesweeper</title>
    <script type="module" src="Javascript/Game.js"></script>
    <link rel="stylesheet" href="styles.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Pokemon Minesweeper</h1>
    <div class="game-select">
        <h2>Select Difficulty:</h2>
        <button id="easy" class="easy button">
            <span class="name">Easy</span>
            <br>
            <span class="details">9 x 9 &bull; 10 mines</span>
        </button>
        <button id="medium" class="medium button">
            <span class="name">Medium</span>
            <br>
            <span class="details">16 x 16 &bull; 40 mines</span>
        </button>
        <button id="hard" class="hard button">
            <span class="name">Hard</span>
            <br>
            <span class="details">30 x 16 &bull; 99 mines</span>
        </button>
    </div>

    <div class="game-section">
        <div class="hud">
            <div class="minesLeft">Mines: 10</div>
            <div class="status"></div>
            <div class="hud-buttons">
                <button id="reset-button">Reset</button>
                <button id="menu-button">Menu</button>
            </div>
        </div>
        <div id="board"></div>
    </div>

</body>

</html>
