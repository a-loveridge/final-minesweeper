<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
</head>
<body>
    <h1>Minesweeper</h1>
    <div class="game-select">
        <h2>Select Difficulty:</h2>
        <button id="easy" class="easy button">Easy</button>
        <button id="medium" class="medium button">Medium</button>
        <button id="hard" class="hard button">Hard</button>
    </div>

    <div class="game-section">
        <div class="extras">
            <button id="restart" class="restart button">Restart</button>
            <p>Time: 00:00</p>
        </div>
        
        <div id="game-board"></div>
    </div>
    
</body>
</html>
